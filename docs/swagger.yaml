basePath: /
definitions:
  service.AssignRoomInput:
    properties:
      activity_id:
        description: Required if Type == "Flexible"
        type: string
      ends_at:
        description: Required if Type == "Flexible"
        type: string
      offshore_role_id:
        description: Required if Type == "Core"
        type: string
      personnel_id:
        type: string
      room_id:
        type: string
      starts_at:
        type: string
      type:
        description: '"Core" or "Flexible"'
        type: string
      vessel_id:
        type: string
    required:
    - personnel_id
    - room_id
    - starts_at
    - type
    - vessel_id
    type: object
  service.CreateRoomInput:
    properties:
      capacity:
        minimum: 1
        type: integer
      category:
        description: '"Dedicated" vs "Transient"'
        type: string
      code:
        type: string
      deck:
        type: string
      name:
        type: string
      vessel_id:
        type: string
    required:
    - code
    - name
    - vessel_id
    type: object
  service.CreateVesselInput:
    properties:
      code:
        type: string
      location:
        type: string
      minimum_safe_pob_capacity:
        type: integer
      name:
        type: string
      pob_capacity:
        type: integer
      type:
        type: string
    required:
    - code
    - name
    - type
    type: object
host: localhost:8080
info:
  contact:
    email: support@swagger.io
    name: API Support
    url: http://www.swagger.io/support
  description: API for managing Personnel On Board, Vessels, and Rooms.
  license:
    name: Apache 2.0
    url: http://www.apache.org/licenses/LICENSE-2.0.html
  termsOfService: http://swagger.io/terms/
  title: POB Management API
  version: "1.0"
paths:
  /api/v1/vessels:
    get:
      description: Fetches a list of all vessels and installations
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: List all vessels
      tags:
      - vessels
    post:
      consumes:
      - application/json
      description: Creates a physical vessel or installation to track
      parameters:
      - description: Vessel Details
        in: body
        name: vessel
        required: true
        schema:
          $ref: '#/definitions/service.CreateVesselInput'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Create a new vessel
      tags:
      - vessels
  /api/v1/vessels/{id}/pob:
    get:
      description: Fast redis-based query for real-time Personnel On Board
      parameters:
      - description: Vessel ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Get live POB for a vessel
      tags:
      - vessels
  /api/v1/vessels/{vesselId}/rooms:
    post:
      consumes:
      - application/json
      description: Sets up a physical room with beds
      parameters:
      - description: Vessel ID
        in: path
        name: vesselId
        required: true
        type: string
      - description: Room Details
        in: body
        name: room
        required: true
        schema:
          $ref: '#/definitions/service.CreateRoomInput'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Create a room inside a vessel
      tags:
      - rooms
  /api/v1/vessels/{vesselId}/rooms/assign:
    post:
      consumes:
      - application/json
      description: Assigns someone to a room and inherently increments the real-time
        POB
      parameters:
      - description: Vessel ID
        in: path
        name: vesselId
        required: true
        type: string
      - description: Assignment logic
        in: body
        name: room
        required: true
        schema:
          $ref: '#/definitions/service.AssignRoomInput'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Assign personnel to a room bed
      tags:
      - rooms
securityDefinitions:
  BearerAuth:
    in: header
    name: Authorization
    type: apiKey
swagger: "2.0"
